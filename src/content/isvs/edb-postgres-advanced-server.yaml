notes:
  - The documented installation minimums for EPAS are not meaningful production sizes, so these tiers are derived from EDB's primary-standby HA guidance and normalized to cloud VM shapes.
  - HA mode adds standbys, failover management, and connection-entry infrastructure rather than assuming those costs are present in the non-HA baseline.
disclaimers:
  - Based on EDB Postgres Advanced Server requirements and public high-availability guidance, translated into VM-based planning tiers.
  - Estimate excludes backup storage, WAL archiving, tuning-specific IOPS requirements, logical replication, and any separate management tooling.
