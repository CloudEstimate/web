slug: edb-postgres-advanced-server
name: EDB Postgres Advanced Server
vendor: EnterpriseDB Corporation
category: data-store
description: >
  Self-managed EDB Postgres Advanced Server for enterprise PostgreSQL workloads with optional primary-standby HA.
ref_arch:
  source_url: https://www.enterprisedb.com/docs/epas/latest/planning/planning_prerequisites/epas_requirements/
  version: "EPAS 18 requirements with current HA deployment guidance"
  retrieved_date: "2026-04-13"
sizes:
  xs:
    label: Extra Small
    range_description: up to 250 GB database size for light OLTP
    ref_arch_tier: single-primary-small
    components:
      - role: primary
        count: 1
        vcpu: 4
        memory_gb: 16
        storage_gb: 500
        storage_type: ssd
      - role: connection-pooler
        count: 1
        vcpu: 2
        memory_gb: 8
        storage_gb: 50
        storage_type: ssd
    ha_components:
      - role: standby
        count: 1
        vcpu: 4
        memory_gb: 16
        storage_gb: 500
        storage_type: ssd
      - role: failover-manager
        count: 1
        vcpu: 2
        memory_gb: 8
        storage_gb: 50
        storage_type: ssd
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
  m:
    label: Medium
    range_description: 250 GB to 1 TB database size for mixed read and write OLTP
    ref_arch_tier: primary-standby-medium
    components:
      - role: primary
        count: 1
        vcpu: 8
        memory_gb: 32
        storage_gb: 1000
        storage_type: ssd
      - role: connection-pooler
        count: 2
        vcpu: 2
        memory_gb: 8
        storage_gb: 50
        storage_type: ssd
    ha_components:
      - role: standby
        count: 2
        vcpu: 8
        memory_gb: 32
        storage_gb: 1000
        storage_type: ssd
      - role: failover-manager
        count: 3
        vcpu: 2
        memory_gb: 8
        storage_gb: 50
        storage_type: ssd
      - role: load-balancer
        count: 2
        vcpu: 2
        memory_gb: 8
  xl:
    label: Extra Large
    range_description: 1 to 5 TB database size or heavier mixed OLTP and reporting
    ref_arch_tier: primary-two-standby-large
    components:
      - role: primary
        count: 1
        vcpu: 16
        memory_gb: 64
        storage_gb: 2000
        storage_type: ssd
      - role: connection-pooler
        count: 2
        vcpu: 4
        memory_gb: 16
        storage_gb: 100
        storage_type: ssd
