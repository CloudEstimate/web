notes:
  - VictoriaMetrics explicitly recommends the single-node version below 1 million samples per second, and recommends at least two nodes for each cluster service when high availability is required.
  - The cluster documentation stresses iterative capacity planning and leaving substantial spare CPU, RAM, and storage, so these tiers should be treated as conservative starting points.
disclaimers:
  - Based on VictoriaMetrics cluster documentation and translated into VM-based planning tiers for single-node and clustered self-managed deployments.
  - Estimate excludes object storage backups, vmagent fan-out, vmauth policy layers beyond the generic load balancer role, and workload-specific tuning from a production test run.
