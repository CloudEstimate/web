slug: nexus-repository
name: Sonatype Nexus Repository
vendor: Sonatype, Inc.
category: artifact-repo
description: >
  Self-managed Sonatype Nexus Repository for package hosting, caching, and binary distribution across development pipelines.
ref_arch:
  source_url: https://help.sonatype.com/en/sonatype-nexus-repository-reference-architectures.html
  version: "3.78+ / cloud-native AWS ref archs updated 2026-04-07"
  retrieved_date: "2026-04-13"
sizes:
  xs:
    label: Extra Small
    range_description: up to 50 requests per second
    ref_arch_tier: xs
    components:
      - role: repository
        count: 1
        vcpu: 4
        memory_gb: 16
        storage_gb: 400
        storage_type: ssd
    ha_components:
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
  s:
    label: Small
    range_description: up to 300 requests per second
    ref_arch_tier: s
    components:
      - role: repository
        count: 1
        vcpu: 8
        memory_gb: 32
        storage_gb: 300
        storage_type: ssd
      - role: database
        count: 1
        vcpu: 2
        memory_gb: 8
    ha_components:
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
  m:
    label: Medium
    range_description: up to 900 requests per second
    ref_arch_tier: m
    components:
      - role: repository
        count: 3
        vcpu: 8
        memory_gb: 32
        storage_gb: 500
        storage_type: ssd
      - role: database
        count: 1
        vcpu: 8
        memory_gb: 64
    ha_components:
      - role: database-replica
        count: 1
        vcpu: 8
        memory_gb: 64
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
  l:
    label: Large
    range_description: up to 2,500 requests per second
    ref_arch_tier: l
    components:
      - role: repository
        count: 3
        vcpu: 32
        memory_gb: 128
        storage_gb: 500
        storage_type: ssd
      - role: database
        count: 1
        vcpu: 16
        memory_gb: 128
    ha_components:
      - role: database-replica
        count: 1
        vcpu: 16
        memory_gb: 128
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
notes:
  - XS through Large tiers are derived from Sonatype's published cloud-native AWS reference architectures and request-rate profiles.
  - For clustered tiers, repository node counts follow the reference architecture; the HA toggle adds the published database failover node and a load balancer.
disclaimers:
  - Based on Sonatype Nexus Repository reference architectures and translated into VM-style planning inputs for multi-cloud estimation.
  - Estimate excludes external object storage capacity, backup infrastructure, and multi-region disaster recovery.
