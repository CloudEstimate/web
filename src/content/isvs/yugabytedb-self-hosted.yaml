slug: yugabytedb-self-hosted
name: YugabyteDB Self-Hosted
vendor: Yugabyte
category: data-store
description: >
  Self-hosted YugabyteDB for distributed SQL workloads that need PostgreSQL compatibility, RF3 durability, and scale-out storage.
ref_arch:
  source_url: https://docs.yugabyte.com/stable/deploy/checklist/
  version: "YugabyteDB v2025.2 LTS deployment checklist"
  retrieved_date: "2026-04-13"
sizes:
  xs:
    label: Extra Small
    range_description: compact RF3 cluster for light production YSQL or YCQL workloads
    ref_arch_tier: rf3-three-node
    components:
      - role: master-tserver
        count: 3
        vcpu: 8
        memory_gb: 32
        storage_gb: 1000
        storage_type: ssd
  m:
    label: Medium
    range_description: six-node RF3 cluster for mainstream distributed OLTP
    ref_arch_tier: rf3-six-node
    components:
      - role: master-tserver
        count: 3
        vcpu: 16
        memory_gb: 64
        storage_gb: 2000
        storage_type: ssd
      - role: tserver
        count: 3
        vcpu: 16
        memory_gb: 64
        storage_gb: 2000
        storage_type: ssd
  xl:
    label: Extra Large
    range_description: nine-node RF3 cluster for larger distributed SQL estates
    ref_arch_tier: rf3-nine-node
    components:
      - role: master-tserver
        count: 3
        vcpu: 16
        memory_gb: 64
        storage_gb: 4000
        storage_type: ssd
      - role: tserver
        count: 6
        vcpu: 16
        memory_gb: 64
        storage_gb: 4000
        storage_type: ssd
notes:
  - YugabyteDB production guidance emphasizes RF3, SSD-backed nodes, and scaling out aggregate CPU for OLTP rather than trying to fit the full dataset in memory.
  - The larger tiers follow the documented six-node RF3 example and extend it into a larger tserver pool while keeping master quorum at three nodes.
disclaimers:
  - Based on YugabyteDB deployment checklist guidance and public RF3 deployment examples, translated into VM-based planning tiers.
  - Estimate excludes backup controllers, xCluster replication, connection-manager sidecars, and multi-region networking or quorum placement costs.
