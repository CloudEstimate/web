slug: elasticsearch-oss
name: Elasticsearch OSS
vendor: Elastic
category: search
description: >
  Legacy-style self-managed Elasticsearch baseline for community and OSS estates running search and log analytics clusters.
ref_arch:
  source_url: https://www.elastic.co/guide/en/elasticsearch/reference/current/important-settings.html
  version: "Current self-managed guidance; OSS distribution lineage froze at 7.10"
  retrieved_date: "2026-04-13"
sizes:
  xs:
    label: Extra Small
    range_description: up to 100 GB hot index data on a single node
    ref_arch_tier: single-node
    components:
      - role: node
        count: 1
        vcpu: 4
        memory_gb: 16
        storage_gb: 500
        storage_type: nvme
    ha_components:
      - role: node
        count: 2
        vcpu: 4
        memory_gb: 16
        storage_gb: 500
        storage_type: nvme
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
  m:
    label: Medium
    range_description: 100 GB to 1 TB hot data on a dedicated master cluster
    ref_arch_tier: dedicated-master-medium
    components:
      - role: data-node
        count: 3
        vcpu: 8
        memory_gb: 32
        storage_gb: 1000
        storage_type: nvme
      - role: master-node
        count: 3
        vcpu: 2
        memory_gb: 8
        storage_gb: 100
        storage_type: ssd
      - role: coordinating-node
        count: 2
        vcpu: 4
        memory_gb: 16
        storage_gb: 100
        storage_type: ssd
  xl:
    label: Extra Large
    range_description: 1 to 5 TB hot data on a scale-out search cluster
    ref_arch_tier: scale-out-large
    components:
      - role: data-node
        count: 6
        vcpu: 16
        memory_gb: 64
        storage_gb: 2000
        storage_type: nvme
      - role: master-node
        count: 3
        vcpu: 2
        memory_gb: 8
        storage_gb: 100
        storage_type: ssd
      - role: coordinating-node
        count: 2
        vcpu: 4
        memory_gb: 16
        storage_gb: 100
        storage_type: ssd
notes:
  - The OSS distribution is a legacy concept after the 7.10 fork, so this entry should be read as a community-style self-managed Elasticsearch planning baseline.
  - Hot-tier node sizes follow Elasticsearch self-managed heap and storage guidance, normalized to the VM shapes available in CloudEstimate.
disclaimers:
  - Based on Elastic's public self-managed operational guidance and translated into a legacy OSS-style VM baseline.
  - Estimate excludes snapshots, warm or frozen tiers, security features tied to commercial distributions, machine learning nodes, and network transfer.
