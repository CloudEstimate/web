slug: kong-gateway
name: Kong Gateway
vendor: Kong Inc.
category: other
description: >
  Self-managed Kong Gateway for API ingress, service proxying, and policy enforcement across internal and external traffic.
ref_arch:
  source_url: https://developer.konghq.com/gateway/resource-sizing-guidelines/
  version: "Kong Gateway 3.4.x resource sizing guidance"
  retrieved_date: "2026-04-13"
sizes:
  xs:
    label: Extra Small
    range_description: under 1,000 configured entities and under 2,500 requests per second
    ref_arch_tier: small
    components:
      - role: gateway
        count: 1
        vcpu: 2
        memory_gb: 4
        storage_gb: 50
        storage_type: ssd
      - role: database
        count: 1
        vcpu: 2
        memory_gb: 8
        storage_gb: 100
        storage_type: ssd
    ha_components:
      - role: gateway
        count: 1
        vcpu: 2
        memory_gb: 4
        storage_gb: 50
        storage_type: ssd
      - role: database-replica
        count: 1
        vcpu: 2
        memory_gb: 8
        storage_gb: 100
        storage_type: ssd
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
  m:
    label: Medium
    range_description: under 10,000 configured entities and under 10,000 requests per second
    ref_arch_tier: medium
    components:
      - role: gateway
        count: 2
        vcpu: 4
        memory_gb: 8
        storage_gb: 100
        storage_type: ssd
      - role: database
        count: 1
        vcpu: 4
        memory_gb: 16
        storage_gb: 200
        storage_type: ssd
    ha_components:
      - role: gateway
        count: 1
        vcpu: 4
        memory_gb: 8
        storage_gb: 100
        storage_type: ssd
      - role: database-replica
        count: 1
        vcpu: 4
        memory_gb: 16
        storage_gb: 200
        storage_type: ssd
      - role: load-balancer
        count: 1
        vcpu: 2
        memory_gb: 8
  xl:
    label: Extra Large
    range_description: 10,000 to 50,000 plus configured entities in a central production gateway cluster
    ref_arch_tier: large
    components:
      - role: gateway
        count: 4
        vcpu: 8
        memory_gb: 32
        storage_gb: 100
        storage_type: ssd
      - role: database
        count: 1
        vcpu: 8
        memory_gb: 32
        storage_gb: 300
        storage_type: ssd
    ha_components:
      - role: gateway
        count: 2
        vcpu: 8
        memory_gb: 32
        storage_gb: 100
        storage_type: ssd
      - role: database-replica
        count: 1
        vcpu: 8
        memory_gb: 32
        storage_gb: 300
        storage_type: ssd
      - role: load-balancer
        count: 2
        vcpu: 2
        memory_gb: 8
notes:
  - Kong's published sizing guide provides per-node gateway resource bands, while the backing PostgreSQL tier here is a conservative planning baseline because Kong does not publish fixed database sizes.
  - The gateway node counts reflect clustered self-managed deployments that scale horizontally behind a load balancer.
disclaimers:
  - Based on Kong Gateway resource sizing guidance and deployment topology documentation, translated into VM-based planning tiers.
  - Estimate excludes Redis-backed rate limiting, developer portal services, Konnect, and workload-specific tuning or benchmark exercises.
