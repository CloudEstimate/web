name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [cache-updated]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://cloudestimate.dev' }}
      PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.PUBLIC_GA4_MEASUREMENT_ID }}
      PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm run sync:functions-data
      - run: npm run validate:isvs
      - run: npm run lint
      - run: npm run test
      - run: npm run check:functions
      - run: npm run validate:terraform -- --mode=validate

  build-and-deploy:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL || 'https://cloudestimate.dev' }}
      PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.PUBLIC_GA4_MEASUREMENT_ID }}
      PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.PUBLIC_GOOGLE_SITE_VERIFICATION }}
      CLOUDESTIMATE_CACHE_BUCKET: ${{ vars.CLOUDESTIMATE_CACHE_BUCKET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm run sync:functions-data
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ vars.CLOUDESTIMATE_GCP_PROJECT_ID }}
      - run: npm install -g firebase-tools
      - run: npm run fetch:caches
      - run: npm run build
      - run: npm run validate:terraform -- --mode=plan
        env:
          TF_VAR_project_id: ${{ vars.CLOUDESTIMATE_GCP_PROJECT_ID }}
      - name: Deploy Hosting and Functions
        run: firebase deploy --only hosting,functions --project ${{ vars.CLOUDESTIMATE_GCP_PROJECT_ID }} --non-interactive
