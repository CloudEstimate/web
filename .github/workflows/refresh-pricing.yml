name: Refresh Pricing Snapshot

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  refresh-pricing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm run sync:functions-data
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ vars.CLOUDESTIMATE_GCP_PROJECT_ID }}
      - name: Refresh pricing snapshot
        run: node functions/scripts/refresh-pricing-snapshot.mjs
      - name: Commit pricing updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/pricing src/data/generated/cache-manifest.json
          git diff --staged --quiet || git commit -m "chore: refresh pricing snapshot $(date -u +%Y-%m-%d)"
          git push origin main
