name: Refresh Pricing Snapshot

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-pricing-main
  cancel-in-progress: false

jobs:
  refresh-pricing:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDESTIMATE_GCP_PROJECT_ID: ${{ vars.CLOUDESTIMATE_GCP_PROJECT_ID }}
      GOOGLE_CLOUD_QUOTA_PROJECT: ${{ vars.CLOUDESTIMATE_GCP_PROJECT_ID }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json
      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm run sync:functions-data
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ vars.CLOUDESTIMATE_GCP_PROJECT_ID }}
      - name: Refresh pricing snapshot
        run: npm run refresh:pricing:snapshot
      - name: Commit pricing updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/pricing src/data/generated/cache-manifest.json
          if git diff --staged --quiet; then
            echo "No pricing updates to commit."
            exit 0
          fi
          git commit -m "chore: refresh pricing snapshot $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main
